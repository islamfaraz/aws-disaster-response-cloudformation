AWSTemplateFormatVersion: '2010-09-09'
Description: >
  S3 — Storage for incident media (photos, videos, documents)

Parameters:
  Environment:
    Type: String
  ProjectName:
    Type: String

Conditions:
  IsProd: !Equals [!Ref Environment, prod]

Resources:
  # ── Incident Media Bucket ──
  MediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-${Environment}-media-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: !If [IsProd, Enabled, Suspended]
      LifecycleConfiguration:
        Rules:
          - Id: ArchiveOldMedia
            Status: Enabled
            Transitions:
              - TransitionInDays: 90
                StorageClass: GLACIER
            NoncurrentVersionTransition:
              - TransitionInDays: 30
                StorageClass: GLACIER
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: ['https://app.disasterresponse.org']
            MaxAge: 3600
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ── Reports Bucket ──
  ReportsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-${Environment}-reports-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Environment
          Value: !Ref Environment

Outputs:
  MediaBucketName:
    Value: !Ref MediaBucket
  MediaBucketArn:
    Value: !GetAtt MediaBucket.Arn
  ReportsBucketName:
    Value: !Ref ReportsBucket
