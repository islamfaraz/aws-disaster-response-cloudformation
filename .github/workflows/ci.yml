# =============================================================================
# GitHub Actions CI — AWS Disaster Response Platform (CloudFormation)
# Validates, lints, scans, and packages CloudFormation templates
# =============================================================================

name: CI — Validate & Package CloudFormation

on:
  push:
    branches: [main, master]
    paths:
      - "infra/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "infra/**"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  TEMPLATE_DIR: infra

jobs:
  # ────────────────────────────────────────────
  # Job 1 — Lint & Validate
  # ────────────────────────────────────────────
  validate:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cfn-lint
        run: pip install cfn-lint

      - name: CloudFormation Lint
        run: cfn-lint ${{ env.TEMPLATE_DIR }}/**/*.yaml

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CloudFormation Validate — Main
        run: |
          aws cloudformation validate-template \
            --template-body file://${{ env.TEMPLATE_DIR }}/main.yaml

      - name: CloudFormation Validate — Modules
        run: |
          for template in ${{ env.TEMPLATE_DIR }}/modules/*.yaml; do
            echo "Validating: $template"
            aws cloudformation validate-template \
              --template-body "file://$template"
          done

  # ────────────────────────────────────────────
  # Job 2 — Security Scan
  # ────────────────────────────────────────────
  security-scan:
    name: 🛡️ Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.TEMPLATE_DIR }}
          framework: cloudformation
          soft_fail: true
          output_format: sarif

      - name: Detect Secrets
        uses: reviewdog/action-detect-secrets@v0.17
        with:
          fail_on_error: true

  # ────────────────────────────────────────────
  # Job 3 — Package & Upload Artifact
  # ────────────────────────────────────────────
  package:
    name: 📦 Package Templates
    runs-on: ubuntu-latest
    needs: [validate, security-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package CloudFormation
        run: |
          aws cloudformation package \
            --template-file ${{ env.TEMPLATE_DIR }}/main.yaml \
            --s3-bucket ${{ secrets.CFN_ARTIFACTS_BUCKET }} \
            --output-template-file packaged-main.yaml

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfn-templates-${{ github.run_number }}
          path: |
            packaged-main.yaml
            ${{ env.TEMPLATE_DIR }}/parameters/
          retention-days: 5
